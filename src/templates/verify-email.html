<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm your email</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        color: #333;
        margin: 0;
        padding: 20px;
      }
      .email-container {
        max-width: 600px;
        margin: 0 auto;
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #3333ff;
      }
      p {
        font-size: 16px;
      }
      a.btn {
        display: inline-block;
        padding: 12px 20px;
        background: #3333ff;
        color: #fff !important;
        border-radius: 8px;
        text-decoration: none;
      }
      .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #777;
      }
    </style>
  </head>
  <body>
    <div class="email-container">
      <h1>Hello, {{name}}!</h1>
      <p>
        Thanks for signing up. Please confirm your email by clicking the button
        below:
      </p>
      <p><a class="btn" href="{{link}}">Confirm email</a></p>
      <p>
        This link will expire in 24 hours. If you didn’t register, just ignore
        this email.
      </p>
      <div class="footer">
        <p>&copy; 2026 main Company. All rights reserved.</p>
      </div>
    </div>
  </body>
</html>
